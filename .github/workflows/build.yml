name: Build

on:
  push:
  workflow_dispatch:
  release:
    types: [ published ]

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CFLAGS: "-Oz -flto -ffunction-sections -fdata-sections -fno-unwind-tables -fno-asynchronous-unwind-tables -Wl,--gc-sections -s"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Build PingPimp ARMv7 (32-bit)
        run: |
          mkdir -p build/armv7
          NDK=${{ steps.setup-ndk.outputs.ndk-path }}
          CLANG="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang"
          $CLANG $CFLAGS -o build/armv7/PingPimp src/PimpPimp.c
          "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip" --strip-all build/armv7/PingPimp
          echo "ARMv7 size: $(ls -lh build/armv7/PingPimp | awk '{print $5}')"

      - name: Build PingPimp ARMv8 (64-bit)
        run: |
          mkdir -p build/armv8
          NDK=${{ steps.setup-ndk.outputs.ndk-path }}
          CLANG="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
          $CLANG $CFLAGS -o build/armv8/PingPimp src/PimpPimp.c
          "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip" --strip-all build/armv8/PingPimp
          echo "ARMv8 size: $(ls -lh build/armv8/PingPimp | awk '{print $5}')"

      - name: Build PingPimp x86 (32-bit)
        run: |
          mkdir -p build/x86
          NDK=${{ steps.setup-ndk.outputs.ndk-path }}
          CLANG="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android21-clang"
          $CLANG $CFLAGS -o build/x86/PingPimp src/PimpPimp.c
          "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip" --strip-all build/x86/PingPimp
          echo "x86 size: $(ls -lh build/x86/PingPimp | awk '{print $5}')"

      - name: Build PingPimp x86_64 (64-bit)
        run: |
          mkdir -p build/x86_64
          NDK=${{ steps.setup-ndk.outputs.ndk-path }}
          CLANG="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android21-clang"
          $CLANG $CFLAGS -o build/x86_64/PingPimp src/PimpPimp.c
          "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip" --strip-all build/x86_64/PingPimp
          echo "x86_64 size: $(ls -lh build/x86_64/PingPimp | awk '{print $5}')"

      - name: Prepare Magisk module
        run: |
          MODULE_DIR="PingPimp"
          mkdir -p "$MODULE_DIR/system/bin"
          
          # Copy template files (tất cả file module)
          cp -r template_pingpimp/* "$MODULE_DIR/"
          
          # Copy binaries
          cp build/armv7/PingPimp "$MODULE_DIR/system/bin/PingPimp_32"
          cp build/armv8/PingPimp "$MODULE_DIR/system/bin/PingPimp_64"
          cp build/x86/PingPimp "$MODULE_DIR/system/bin/PingPimp_x86"
          cp build/x86_64/PingPimp "$MODULE_DIR/system/bin/PingPimp_x64"
          
          # Copy WebUI (nếu có)
          if [ -d "webroot" ]; then
            cp -r webroot "$MODULE_DIR/"
          fi
          
          # Set permissions
          chmod 755 "$MODULE_DIR/system/bin/"*
          find "$MODULE_DIR" -type f -name "*.sh" -exec chmod 755 {} +
          
          # Zip
          cd "$MODULE_DIR" && zip -r9 "../PingPimp.zip" . && cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PingPimp
          path: PingPimp.zip

      - name: Upload to release
        if: github.event_name == 'release'
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./PingPimp.zip
          asset_name: PingPimp-${{ github.ref_name }}.zip
          asset_content_type: application/zip